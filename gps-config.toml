[colors]
track = "#0078ff"
fixed = "#ff5028"

[ble]
enabled = true
show_path = false
mac = ""
# Pin a specific beacon instead of scanning for the GPS service:
# mac = "AA:BB:CC:DD:EE:FF"

[track]
min_distance = 3.0

[sizes]
marker = 8.0
beacon = 6.0
track = 3.0
distance_line = 3.0
distance_text = 14.0

[distance]
show = false
units = "metric"
dotted = true

[compass]
# Heading-up always runs the compass at full rate; these are for north-up and
# tracking, where it only points the arrow on your marker.
marker_arrow = true
arrow_hz = 4.0
