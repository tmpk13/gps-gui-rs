[colors]
track = "#0078ff"
fixed = "#ff5028"
# Ring around the position and beacon dots.
outline = "#ffffff"

# Colors of the pages, not of the map: the places that carry meaning by color,
# and the two surfaces the rest is drawn on.
[ui]
ok = "#3cb44b"
error = "#dc503c"
# A toolbar button flagging that it has no target.
pulse = "#c82828"
# The surfaces and the text everything else is drawn with. Empty follows the
# light/dark theme, which is what keeps these three readable against each other;
# setting one is taking that on yourself.
background = ""
button = ""
text = ""

[ble]
enabled = true
show_path = false
mac = ""
# Pin a specific beacon instead of scanning for the GPS service:
# mac = "AA:BB:CC:DD:EE:FF"

[track]
min_distance = 3.0
# Draw the phone's own recorded path. Recording is unaffected either way; the
# map bar's path button hides this and the beacon path together.
show_path = true

[sizes]
marker = 8.0
beacon = 6.0
track = 3.0
distance_line = 3.0
distance_text = 14.0

[distance]
show = false
units = "metric"
dotted = true

[compass]
# Heading-up always runs the compass at full rate; these are for north-up and
# tracking, where it only points the arrow on your marker.
marker_arrow = true
arrow_hz = 4.0
